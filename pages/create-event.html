<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event</title>

    <link rel="stylesheet" href="../assets/css/create-event.css" />
  </head>
  <body>
    <div class="event-container">
      <h1>Create Academic Event</h1>

      <input type="text" id="title" placeholder="Event Title" />

      <input type="date" id="date" />

      <input type="text" id="location" placeholder="Location" />

      <textarea id="description" placeholder="Event Description"></textarea>

      <button onclick="createEvent()">Create Event</button>

      <p id="message"></p>
    </div>

    <script src="../assets/js/create-event.js"></script>
  </body>
</html>
